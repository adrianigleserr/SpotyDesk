@if (!esRutaPublica()) {
  <nav class="bg-white border-b border-slate-200 px-6 flex justify-between items-end shadow-sm">
    <div class="flex items-center gap-2 pb-3 pt-4">
      <div
        class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold"
      >
        S
      </div>
      <span class="text-xl font-bold text-slate-800 tracking-tight hidden md:block">SpotyDesk</span>
    </div>

    <div class="flex gap-4 sm:gap-8">
      <a
        routerLink="/dashboard"
        routerLinkActive="!border-blue-600 !text-blue-600"
        [routerLinkActiveOptions]="{ exact: true }"
        class="group flex flex-col items-center justify-center pt-3 pb-2 px-2 border-b-[3px] border-transparent text-slate-500 hover:text-blue-600 min-w-[70px] sm:min-w-[90px] cursor-pointer transition-all"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-6 h-6 mb-1"
        >
          <path
            d="M11.47 3.84a.75.75 0 011.06 0l8.99 8.99a.75.75 0 11-1.06 1.06l-4.21-4.21V21a.75.75 0 01-.75.75h-3v-4.5a.75.75 0 00-.75-.75h-1.5a.75.75 0 00-.75.75V21h-3a.75.75 0 01-.75-.75v-11.36l-4.21 4.21a.75.75 0 01-1.06-1.06l8.99-8.99z"
          />
        </svg>
        <span class="text-[11px] sm:text-xs font-bold">Inicio</span>
      </a>

      <a
        routerLink="/reservas"
        routerLinkActive="!border-blue-600 !text-blue-600"
        class="group flex flex-col items-center justify-center pt-3 pb-2 px-2 border-b-[3px] border-transparent text-slate-500 hover:text-blue-600 min-w-[70px] sm:min-w-[90px] cursor-pointer transition-all"
      >
        <div class="relative">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform"
          >
            <path
              fill-rule="evenodd"
              d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5Z"
              clip-rule="evenodd"
            />
          </svg>
          <span
            class="absolute top-0 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"
          ></span>
        </div>
        <span class="text-[11px] sm:text-xs font-medium">Reservas</span>
      </a>

      <a
        routerLink="/empresa"
        routerLinkActive="!border-blue-600 !text-blue-600"
        class="group flex flex-col items-center justify-center pt-3 pb-2 px-2 border-b-[3px] border-transparent text-slate-500 hover:text-blue-600 min-w-[70px] sm:min-w-[90px] cursor-pointer transition-all"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform"
        >
          <path
            fill-rule="evenodd"
            d="M8.25 6.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0ZM15.75 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2.25 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM6.31 15.117A6.745 6.745 0 0 1 12 12a6.745 6.745 0 0 1 6.709 7.498.75.75 0 0 1-.372.568A12.696 12.696 0 0 1 12 21.75c-2.305 0-4.47-.612-6.337-1.684a.75.75 0 0 1-.372-.568 6.787 6.787 0 0 1 1.019-4.38Z"
            clip-rule="evenodd"
          />
          <path
            d="M5.082 14.254a8.287 8.287 0 0 0-1.308 5.135.968.968 0 0 1-1.146.953A8.962 8.962 0 0 1 1.25 18.25a.75.75 0 0 1 .436-.88 6.73 6.73 0 0 1 3.396-3.116ZM18.918 14.254a8.287 8.287 0 0 1 1.308 5.135.968.968 0 0 0 1.146.953 8.962 8.962 0 0 0 1.378-2.092.75.75 0 0 0-.436-.88 6.73 6.73 0 0 0-3.396-3.116Z"
          />
        </svg>
        <span class="text-[11px] sm:text-xs font-medium">Empresa</span>
      </a>

      <a
        routerLink="/usuario"
        routerLinkActive="!border-blue-600 !text-blue-600"
        class="group flex flex-col items-center justify-center pt-3 pb-2 px-2 border-b-[3px] border-transparent text-slate-500 hover:text-blue-600 min-w-[70px] sm:min-w-[90px] cursor-pointer transition-all"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform"
        >
          <path
            fill-rule="evenodd"
            d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z"
            clip-rule="evenodd"
          />
        </svg>
        <span class="text-[11px] sm:text-xs font-medium">Perfil</span>
      </a>
    </div>

    <!-- AQUÍ ESTÁN LOS CAMBIOS -->
    <div class="flex items-center gap-3 pb-3 pt-4">
      <!-- Mostramos el nombre del usuario logueado en lugar de 'Admin' -->
      <span class="text-sm font-bold text-slate-700 hidden sm:block">{{ nombreUsuario }}</span>

      @if (avatarUrl) {
        <!-- Muestra la foto con la inicial y fondo aleatorio -->
        <img
          [src]="avatarUrl"
          alt="Avatar"
          class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover"
        />
      } @else {
        <!-- Icono por defecto (Invitado) -->
        <div
          class="w-10 h-10 bg-slate-200 rounded-full border-2 border-white shadow-sm flex items-center justify-center overflow-hidden"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-slate-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
        </div>
      }
    </div>
  </nav>
}

<router-outlet></router-outlet>
