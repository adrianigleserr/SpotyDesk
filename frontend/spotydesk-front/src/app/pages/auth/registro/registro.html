<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
  <div
    class="max-w-md w-full space-y-6 bg-white p-10 rounded-3xl shadow-xl border border-slate-100"
  >
    <div class="text-center">
      <div
        class="mx-auto h-12 w-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-extrabold text-2xl shadow-lg shadow-blue-200"
      >
        S
      </div>
      <h2 class="mt-4 text-2xl font-extrabold text-slate-900 tracking-tight">
        Crea tu cuenta corporativa
      </h2>
    </div>

    <form class="mt-8 space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
          <input
            type="text"
            name="nombre"
            [(ngModel)]="nombre"
            required
            class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Apellidos</label>
          <input
            type="text"
            name="apellidos"
            [(ngModel)]="apellidos"
            required
            class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all"
          />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de la Empresa</label>
        <input
          type="text"
          name="nombreEmpresa"
          [(ngModel)]="nombreEmpresa"
          required
          class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Correo corporativo</label>
        <input
          type="email"
          name="correo"
          [(ngModel)]="correo"
          required
          class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all"
        />
      </div>

      <div
        *ngIf="mensajeError"
        class="text-red-600 text-xs font-bold bg-red-50 p-2 rounded-lg border border-red-100 text-center"
      >
        {{ mensajeError }}
      </div>

      <button
        type="button"
        (click)="registrarUsuario()"
        class="w-full py-3 px-4 text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-md transition-all"
      >
        Comenzar a usar SpotyDesk
      </button>
    </form>

    <div class="text-center mt-4">
      <a
        routerLink="/login"
        class="text-sm font-bold text-blue-600 hover:text-blue-500 transition-colors"
      >
        ¿Ya tienes cuenta? Inicia sesión
      </a>
    </div>
  </div>
</div>
