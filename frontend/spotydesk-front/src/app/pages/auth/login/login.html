<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
  <div
    class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-slate-100"
  >
    <div class="text-center">
      <div
        class="mx-auto h-14 w-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-extrabold text-3xl shadow-lg shadow-blue-200"
      >
        S
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-slate-900 tracking-tight">SpotyDesk</h2>
      <p class="mt-2 text-sm text-slate-500">Accede al sistema de gestión inteligente</p>
    </div>

    <form class="mt-8 space-y-6">
      <div class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1"
            >Correo corporativo</label
          >
          <input
            id="email"
            name="correo"
            type="email"
            autocomplete="email"
            required
            [(ngModel)]="correo"
            class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all"
            placeholder="tu@empresa.com"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1"
            >Contraseña</label
          >
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            [(ngModel)]="password"
            class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input
            id="remember-me"
            name="remember-me"
            type="checkbox"
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded cursor-pointer"
          />
          <label for="remember-me" class="ml-2 block text-sm text-slate-600 cursor-pointer">
            Recordar mi sesión
          </label>
        </div>

        <div class="text-sm">
          <a
            routerLink="/recuperar-clave"
            class="font-medium text-blue-600 hover:text-blue-500 transition-colors cursor-pointer"
          >
            ¿Olvidaste tu clave?
          </a>
        </div>
      </div>

      <div
        *ngIf="mensajeError"
        class="text-red-500 text-sm font-bold text-center bg-red-50 py-2 rounded-lg border border-red-100"
      >
        {{ mensajeError }}
      </div>

      <div>
        <button
          type="button"
          (click)="iniciarSesion()"
          class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-md shadow-blue-200 transition-all hover:-translate-y-0.5"
        >
          Iniciar Sesión
        </button>
      </div>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-slate-600">
        ¿Tu empresa no tiene cuenta?
        <a
          routerLink="/registro"
          class="font-bold text-blue-600 hover:text-blue-500 transition-colors"
        >
          Regístrala aquí
        </a>
      </p>
    </div>
  </div>
</div>
